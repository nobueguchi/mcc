  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1aa5\" draggable=\"false\" style=\"position:absolute;top:0;left:0;width:3360px;height:1634px;z-index:42;opacity:0;pointer-events:none;\">\n\n  <\u002Fdiv>\n\n  <button ref=\"{{ replayBtn }}\" onclick=\"{{ onReplay }}\" aria-label=\"Replay\" style=\"position:absolute;right:28px;bottom:28px;width:56px;height:56px;border:none;border-radius:50%;background:linear-gradient(135deg,#f29600,#e60012);color:#fff;font-size:26px;line-height:1;cursor:pointer;opacity:0;transition:opacity .5s ease, transform .2s ease;box-shadow:0 6px 20px rgba(230,0,18,.35);display:flex;align-items:center;justify-content:center;z-index:100;\" style-hover=\"transform:scale(1.08)\">↻<\u002Fbutton>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;durationSec&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:13,&quot;min&quot;:8,&quot;max&quot;:24,&quot;step&quot;:0.5,&quot;tsType&quot;:&quot;number&quot;},&quot;replayButton&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  refsMap = Object.fromEntries(\n    ['root','stage','patternA','line','boxClosed','boxGrad','boxOpen','logo',\n     'itemA','itemB','itemC','textF4','gradient','patternG','circleGroup',\n     'lineF6','boxOpenF6','f6a','f6b','f6c','f6d','f6e','f6f','f6L','textF6','replayBtn']\n    .map(k => [k, React.createRef()])\n  );\n\n  // ---- easing ----\n  clamp(x){ return x < 0 ? 0 : x > 1 ? 1 : x; }\n  p(t,a,b){ return this.clamp((t-a)/(b-a)); }\n  lerp(p,from,to){ return from + (to-from)*p; }\n  eOut(x){ return 1 - Math.pow(1-x,3); }\n  eInOut(x){ return x < .5 ? 4*x*x*x : 1 - Math.pow(-2*x+2,3)/2; }\n  eBack(x){ const c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(x-1,3) + c1*Math.pow(x-1,2); }\n\n  set(ref, prop, val){ const el=this.refsMap[ref].current; if(el) el.style[prop]=val; }\n\n  apply(t){\n    const {lerp,eOut,eInOut,eBack} = this;\n    const P=(a,b)=>this.p(t,a,b);\n    const END=this.dur();\n\n    // background pattern (on white): fade + slow parallax drift\n    this.set('patternA','opacity', String(P(0,700)*0.95));\n    const par = eInOut(P(0,END*0.95));\n    this.set('patternA','transform', `translate(${lerp(par,-46,0)}px, ${lerp(par,-22,0)}px) scale(${lerp(par,1.05,1)})`);\n\n    // (1) bottom line draws across from the left\n    const lineP = eOut(P(300,2600));\n    this.set('line','transform', `scaleX(${lineP})`);\n\n    // (1) closed red box appears just as the line tip reaches it (~x2643 => ~1230ms)\n    this.set('boxClosed','transform', `scale(${lerp(eBack(P(1230,1750)),0.5,1)})`);\n    // (2) seamless colour change: keep the closed box fully opaque underneath until the\n    //     gradient box has fully faded in on top, then hide it (no transparent flash)\n    this.set('boxClosed','opacity', String(t < 2750 ? P(1230,1650) : 0));\n    this.set('boxGrad','opacity',   String(t < 4650 ? P(2200,2700) : 0));\n    // open box fades in on top of the (still-opaque) gradient box\n    this.set('boxOpen','opacity', String(P(4050,4650)));\n    this.set('boxOpen','transform', `scale(${lerp(eBack(P(4050,4750)),0.9,1)})`);\n\n    // (3) logo simply fades in, in place\n    this.set('logo','opacity', String(eOut(P(3100,4300))));\n\n    // message text (frame 4) rises in\n    this.set('textF4','opacity', String(P(5000,5700)));\n    this.set('textF4','transform', `translateY(${lerp(eOut(P(5000,5800)),42,0)}px)`);\n\n    // items burst out of the open box (physics-ish)\n    const burst=(ref, start, dx, dy, rot)=>{\n      const pr = P(start, start+950);\n      const pos = eBack(pr), sc = eOut(pr);\n      this.set(ref,'opacity', String(P(start, start+220)));\n      this.set(ref,'transform', `translate(${lerp(pos,dx,0)}px, ${lerp(pos,dy,0)}px) rotate(${lerp(pos,rot,0)}deg) scale(${lerp(sc,0.12,1)})`);\n    };\n    burst('itemA', 4600, 150, 220, -34);\n    burst('itemB', 4750, 40, 580,  42);\n    burst('itemC', 4900, -80, 300, -22);\n\n    // (4) hold the \"50th\" message for ~3s, then (5) the gradient sweeps in.\n    //     The gradient sits UNDER the pattern (patternG) so the icon motif stays visible.\n    const wipe = eInOut(P(8700,9550));\n    this.set('gradient','clipPath', `inset(0% ${lerp(wipe,100,0)}% 0% 0%)`);\n    this.set('patternG','opacity', String(P(8700,9550)*0.9));\n\n    // white circle opens to reveal frame 6\n    const cr = eInOut(P(9600,11100));\n    this.set('circleGroup','clipPath', `circle(${lerp(cr,0,1049)}px at 1680px 918px)`);\n\n    // frame 6 bottom line + box settle in\n    this.set('lineF6','opacity', String(P(9800,10500)));\n    this.set('boxOpenF6','opacity', String(P(9850,10550)));\n    this.set('boxOpenF6','transform', `scale(${lerp(eBack(P(9850,10650)),0.85,1)})`);\n\n    // (6) peripheral parts emerge slowly from the box and settle at their original\n    //     SVG positions (no further drift)\n    const OX=1790, OY=1400; // box mouth\n    const fly=(ref, rx, ry, start)=>{\n      const dx=rx-OX, dy=ry-OY;\n      const emerge = eOut(P(start, start+1700));        // box -> rest position, gently\n      const tx = lerp(emerge, -dx, 0);\n      const ty = lerp(emerge, -dy, 0);\n      const rot = lerp(emerge, -28, 0);\n      this.set(ref,'opacity', String(P(start, start+300)));\n      this.set(ref,'transform', `translate(${tx}px, ${ty}px) rotate(${rot}deg) scale(${lerp(eOut(P(start,start+900)),0.1,1)})`);\n    };\n    fly('f6a', 430,1180, 9900);\n    fly('f6b', 920, 520, 9950);\n    fly('f6c',2300, 470,10050);\n    fly('f6d',2920, 700,10000);\n    fly('f6e',3070,1190,10150);\n    fly('f6f',2470, 915,10080);\n    fly('f6L',1095,1270,10200);\n\n    this.set('textF6','opacity', String(P(10350,11100)));\n    this.set('textF6','transform', `translateY(${lerp(eOut(P(10350,11200)),34,0)}px)`);\n  }\n\n  rescale = () => {\n    const root=this.refsMap.root.current, stage=this.refsMap.stage.current;\n    if(!root||!stage) return;\n    const s = Math.min(root.clientWidth/3360, root.clientHeight/1634);\n    stage.style.transform = `scale(${s})`;\n    stage.style.position='absolute';\n    stage.style.left = ((root.clientWidth - 3360*s)/2)+'px';\n    stage.style.top  = ((root.clientHeight - 1634*s)/2)+'px';\n  };\n\n  loop = (now) => {\n    const t = now - this.t0;\n    const end = this.dur();\n    this.apply(Math.min(t, end));\n    if(t < end){\n      this.raf = requestAnimationFrame(this.loop);\n    } else {\n      const b=this.refsMap.replayBtn.current; if(b) b.style.opacity='1';\n    }\n  };\n\n  dur(){ return (this.props.durationSec ?? 13) * 1000; }\n\n  start = () => {\n    if(this.raf) cancelAnimationFrame(this.raf);\n    const b=this.refsMap.replayBtn.current; if(b) b.style.opacity='0';\n    this.t0 = performance.now();\n    this.raf = requestAnimationFrame(this.loop);\n  };\n\n  componentDidMount(){\n    window.__anim = this;\n    this.rescale();\n    window.addEventListener('resize', this.rescale);\n    // let images settle a touch, then play once\n    this.apply(0);\n    setTimeout(this.start, 200);\n  }\n  componentWillUnmount(){\n    window.removeEventListener('resize', this.rescale);\n    if(this.raf) cancelAnimationFrame(this.raf);\n  }\n\n  renderVals(){\n    const showReplay = this.props.replayButton ?? true;\n    return {\n      ...this.refsMap,\n      onReplay: showReplay ? this.start : null,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
